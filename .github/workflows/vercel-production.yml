# 可选：用 GitHub Actions 在推送时部署到 Vercel。
# 若已在 Vercel 里勾选 “Import Git Repository” 自动部署，不要同时启用本 workflow，否则会重复部署。
# 需在 GitHub 仓库 Settings → Secrets and variables → Actions 添加：
#   VERCEL_TOKEN（Vercel → Account Settings → Tokens）
#   VERCEL_ORG_ID、VERCEL_PROJECT_ID（Vercel 项目 Settings → General，或本机 vercel link 后 .vercel/project.json）
# 生产环境变量（如 NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME）请在 Vercel 项目 Environment Variables 里配置。

name: Deploy to Vercel (production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (optional metadata)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy prebuilt to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --yes
